name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Init Capacitor
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          npx cap init "وَمضة" "com.idxgaza.wamda" --web-dir dist
          npx cap add android

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Sign APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          jarsigner -verbose \
            -keystore $GITHUB_WORKSPACE/release.keystore \
            -storepass wamda123 \
            -keypass wamda123 \
            app/build/outputs/apk/release/app-release-unsigned.apk wamda
          zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-signed.apk
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wamda-apk
          path: android/app/build/outputs/apk/release/app-release-signed.apk
