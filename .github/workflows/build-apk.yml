name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias wamda \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass wamda123 \
            -keypass wamda123 \
            -dname "CN=Wamda, OU=IDXGaza, O=IDXGaza, L=Gaza, S=Gaza, C=PS"
          base64 release.keystore

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Init Capacitor
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          npx cap init "وَمضة" "com.idxgaza.wamda" --web-dir dist
          npx cap add android

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wamda-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
